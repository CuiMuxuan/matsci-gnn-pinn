notes:
  - "Phase 17 starts with this optical microscopy dataset because it is smaller and simpler than mds2-2775, while sharing the AMB2022-03 process context."
  - "The full PDR record contains 102 TIFF images, 104 checksum files, one README, and one measurement-results XLSX file."
  - "This manifest pins a small first subset: README, melt-pool measurement XLSX, one representative measured single-track cross-section TIFF, and its checksum sidecar."
  - "Optional files define a deliberately small multi-image single-track panel across P/L/replicate conditions; use --include-optional or repeated --file-id only after the first inspection route is validated."
